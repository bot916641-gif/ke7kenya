<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Aviatork7 — Crash Game</title>

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #07070b;
    color: #fff;
    -webkit-font-smoothing: antialiased;
  }

  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }

  /* TOP BAR (match BET FITY style) */
  header.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    background: #0b0b0f;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .brand {
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 1px;
  }

  .brand .accent { color: #ff3b3b; }

  .top-actions .balance {
    color: #00ff66;
    font-weight: 700;
    background: rgba(0,255,102,0.08);
    padding: 6px 10px;
    border-radius: 8px;
  }

  .top-actions a, .top-actions button {
    margin-left: 6px;
    padding: 6px 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    color: #fff;
    font-size: 12px;
  }

  /* GAME LAYOUT */
  .game {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  .game-body {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 14px;
    padding: 14px;
  }

  @media (max-width: 900px) {
    .game-body { grid-template-columns: 1fr; }
  }

  /* MAIN PANEL */
  .panel {
    background: #0c0c12;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 12px;
  }

  /* HISTORY */
  .history-strip {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .history-strip .h {
    font-size: 12px;
    padding: 3px 7px;
    border-radius: 6px;
    background: rgba(255,255,255,0.06);
  }

  .history-strip .h.high { color: #00ff66; }
  .history-strip .h.low { color: #ff4d4d; }

  /* GAME AREA */
  .canvas-wrap {
    position: relative;
    aspect-ratio: 16/9;
    max-height: 60vh;
    border-radius: 10px;
    overflow: hidden;
    background: radial-gradient(circle at center, #111 0%, #050507 100%);
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* subtle plane effect (no DOM added) */
  .canvas-wrap::after {
    content: "✈";
    position: absolute;
    left: 18%;
    top: 55%;
    font-size: 26px;
    color: rgba(255,255,255,0.15);
    transform: rotate(-10deg);
    pointer-events: none;
  }

  /* MULTIPLIER CENTER */
  .multiplier-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    pointer-events: none;
  }

  .multiplier-overlay .big {
    font-size: 78px;
    font-weight: 900;
    color: #ffffff;
  }

  .multiplier-overlay .label {
    font-size: 13px;
    color: #aaa;
  }

  .multiplier-overlay.crashed .big { color: #ff4d4d; }
  .multiplier-overlay.betting .big { color: #ffcc66; font-size: 56px; }

  /* BET PANEL (match screenshot style) */
  .bet-panel {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .input-group {
    display: flex;
    gap: 6px;
  }

  .input-group input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    background: #111;
    border: 1px solid rgba(255,255,255,0.08);
    color: #fff;
  }

  .stepper button {
    width: 34px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.1);
    background: #15151b;
    color: #fff;
  }

  .quick-amounts {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .quick-amounts button {
    padding: 7px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.08);
    background: #12121a;
    color: #fff;
  }

  /* MAIN BET BUTTON (green like screenshot) */
  .bet-button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-weight: 800;
    font-size: 15px;
    color: #fff;
  }

  .bet-button.bet {
    background: #00c853;
  }

  .bet-button.cashout {
    background: #ff9800;
  }

  .bet-button:disabled {
    background: #333;
  }

  /* LIVE BETS */
  .live-bets .row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13px;
  }

  .live-bets .cashed { color: #00ff66; }
</style>
</head>

<body>

<div class="game">

  <header class="topbar">
    <div class="brand">BET <span class="accent">FITY</span> <small style="color:#777">.co.ke</small></div>

    <div class="top-actions">
      <div class="balance">7428.6 KES</div>
      <a href="#">Game</a>
      <a href="#">Referral</a>
      <a href="#">Profile</a>
    </div>
  </header>

  <div class="game-body">

    <!-- MAIN GAME -->
    <div class="panel">

      <div class="history-strip">
        <div class="h high">4.88x</div>
        <div class="h low">1.61x</div>
        <div class="h high">9.94x</div>
        <div class="h">3.67x</div>
      </div>

      <div class="canvas-wrap">
        <canvas></canvas>

        <div class="multiplier-overlay">
          <div class="big">1.14x</div>
          <div class="label">Aviator</div>
        </div>
      </div>

    </div>

    <!-- BET PANEL -->
    <div class="panel bet-panel">

      <div class="input-group">
        <div class="stepper">
          <button>-</button>
        </div>

        <input type="number" value="10" />

        <div class="stepper">
          <button>+</button>
        </div>
      </div>

      <div class="quick-amounts">
        <button>100</button>
        <button>200</button>
        <button>500</button>
        <button>1000</button>
      </div>

      <button class="bet-button bet">BET</button>

      <div class="live-bets">
        <div class="row">
          <span class="username">Live Bets</span>
          <span class="cashed">No bets yet</span>
        </div>
      </div>

    </div>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/client.js"></script>

</body>
</html>
