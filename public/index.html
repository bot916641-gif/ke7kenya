<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Aviator — Crash Game</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #fff;
    background: radial-gradient(circle at 20% 10%, #2a1a4a 0%, #0e0820 55%, #060311 100%);
    -webkit-font-smoothing: antialiased;
  }
  a { color: #d2a6ff; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }
  input, button { font-family: inherit; }
  .hidden { display: none !important; }
  .muted { color: #a89bc7; }
  .err { color: #ff7a7a; font-size: 13px; min-height: 18px; }
  .ok { color: #6ee895; font-size: 13px; min-height: 18px; }
  .row { display: flex; gap: 10px; align-items: center; }
  .spread { justify-content: space-between; }

  /* Auth + wallet card style */
  .center-page {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .card {
    width: 100%; max-width: 420px;
    background: rgba(20, 14, 40, 0.85);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; padding: 26px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .card.wide { max-width: 720px; }
  .card h1 { margin: 0 0 4px; font-size: 22px; }
  .card label { display: block; margin: 14px 0 6px; font-size: 13px; color: #cdbcf2; }
  .card input, .card select {
    width: 100%; padding: 11px 12px; border-radius: 10px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    color: #fff; font-size: 15px; outline: none;
  }
  .card input:focus, .card select:focus { border-color: #a23bff; }
  .card .primary {
    margin-top: 16px; width: 100%; padding: 12px; border: none; border-radius: 10px;
    background: linear-gradient(135deg,#a23bff,#5a2fd6); color: #fff; font-weight: 700; font-size: 15px;
  }
  .card .primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .warn {
    margin-top: 12px; padding: 10px 12px; border-radius: 8px;
    background: rgba(255, 200, 80, 0.12); color: #ffd086; font-size: 12px;
    border: 1px solid rgba(255, 200, 80, 0.3);
  }
  .balance-box {
    margin-top: 14px; padding: 14px; background: rgba(255,255,255,0.04);
    border-radius: 12px; display: flex; justify-content: space-between; gap: 12px;
  }
  .tabs {
    display: flex; gap: 6px; margin-top: 18px; padding: 4px;
    background: rgba(255,255,255,0.05); border-radius: 10px;
  }
  .tabs button {
    flex: 1; padding: 8px; background: transparent; color: #cdbcf2;
    border: none; border-radius: 7px; font-size: 14px;
  }
  .tabs button.active {
    background: linear-gradient(135deg,#a23bff,#5a2fd6); color: #fff;
  }
  .tx-list { margin-top: 16px; max-height: 300px; overflow: auto; }
  .tx-row {
    display: grid; grid-template-columns: 1fr auto auto; gap: 12px;
    align-items: center; padding: 10px 6px; border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 14px;
  }
  .pill {
    padding: 2px 8px; border-radius: 6px; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.5px; background: rgba(255,255,255,0.08);
  }
  .pill.completed { background: rgba(110,232,149,0.15); color: #6ee895; }
  .pill.pending { background: rgba(255,200,80,0.15); color: #ffd086; }
  .pill.failed { background: rgba(255,122,122,0.15); color: #ff7a7a; }

  /* Game layout */
  .game {
    min-height: 100vh; display: grid;
    grid-template-rows: auto 1fr;
  }
  header.topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 22px; background: rgba(0,0,0,0.25);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .brand { font-weight: 800; font-size: 20px; letter-spacing: 0.5px; }
  .brand .accent { color: #d2a6ff; }
  .top-actions { display: flex; gap: 10px; align-items: center; }
  .top-actions .balance { font-weight: 700; padding: 6px 12px; border-radius: 8px;
    background: rgba(255,255,255,0.06); }
  .top-actions a, .top-actions button {
    padding: 7px 12px; border-radius: 8px; background: rgba(255,255,255,0.08);
    color: #fff; border: 1px solid rgba(255,255,255,0.1); font-size: 13px;
  }
  .top-actions button.danger { color: #ff9090; border-color: rgba(255,122,122,0.25); background: transparent; }

  .game-body {
    display: grid; grid-template-columns: 1fr 320px; gap: 16px; padding: 16px;
    height: 100%;
  }
  @media (max-width: 900px) { .game-body { grid-template-columns: 1fr; } }
  .panel {
    background: rgba(20, 14, 40, 0.7);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px; padding: 14px;
  }
  .history-strip {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px;
  }
  .history-strip .h {
    padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 700;
    background: rgba(255,255,255,0.06);
  }
  .history-strip .h.high { color: #6ee895; }
  .history-strip .h.low { color: #ff7a7a; }

  .canvas-wrap { position: relative; aspect-ratio: 16 / 9; max-height: 60vh; }
  canvas { width: 100%; height: 100%; display: block; border-radius: 10px;
    background: linear-gradient(180deg, #0a0420 0%, #1a0c3d 100%); }
  .multiplier-overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; pointer-events: none; text-align: center;
  }
  .multiplier-overlay .big {
    font-size: clamp(48px, 9vw, 96px); font-weight: 900; letter-spacing: 1px;
    text-shadow: 0 4px 30px rgba(255,255,255,0.2);
  }
  .multiplier-overlay .label { font-size: 14px; color: #cdbcf2; margin-top: 6px; }
  .multiplier-overlay.crashed .big { color: #ff7a7a; }
  .multiplier-overlay.betting .big { color: #ffd086; font-size: clamp(40px, 7vw, 64px); }

  .bet-panel { display: flex; flex-direction: column; gap: 12px; }
  .bet-panel .input-group { display: flex; gap: 6px; align-items: center; }
  .bet-panel .input-group input { flex: 1; }
  .stepper { display: flex; gap: 4px; }
  .stepper button {
    width: 36px; padding: 6px; border-radius: 6px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    color: #fff; font-weight: 700;
  }
  .quick-amounts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .quick-amounts button {
    padding: 8px; border-radius: 6px; background: rgba(255,255,255,0.05);
    color: #fff; border: 1px solid rgba(255,255,255,0.1); font-size: 13px;
  }
  .bet-button {
    width: 100%; padding: 14px; border: none; border-radius: 10px;
    color: #fff; font-weight: 800; font-size: 16px; letter-spacing: 0.5px;
  }
  .bet-button.bet { background: linear-gradient(135deg, #1cb868, #0c8a48); }
  .bet-button.cashout { background: linear-gradient(135deg, #ff9b3b, #f0682f); }
  .bet-button:disabled { background: #444; opacity: 0.6; cursor: not-allowed; }

  .live-bets { font-size: 13px; }
  .live-bets .row {
    padding: 6px 4px; border-bottom: 1px solid rgba(255,255,255,0.05);
    justify-content: space-between;
  }
  .live-bets .username { color: #cdbcf2; }
  .live-bets .cashed { color: #6ee895; font-weight: 700; }
  .live-bets .pending { color: #ffd086; }
</style>
</head>
<body>
<div id="root"></div>
<script src="/socket.io/socket.io.js"></script>
<script src="/client.js"></script>
</body>
</html>
