<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aviator Admin</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #fff; background: #08061a; -webkit-font-smoothing: antialiased;
  }
  a { color: #d2a6ff; text-decoration: none; }
  button, input, select { font-family: inherit; }
  .err { color: #ff7a7a; }
  .ok { color: #6ee895; }
  .muted { color: #a89bc7; }
  .row { display: flex; gap: 10px; align-items: center; }
  .spread { justify-content: space-between; }

  .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .login-card {
    width: 360px; padding: 28px;
    background: #15113a; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px;
  }
  .login-card h1 { margin: 0 0 4px; }
  .login-card label { display: block; margin: 14px 0 6px; font-size: 13px; color: #cdbcf2; }
  .login-card input {
    width: 100%; padding: 10px 12px; border-radius: 10px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: #fff;
  }
  .login-card button {
    margin-top: 16px; width: 100%; padding: 12px; border: none; border-radius: 10px;
    background: linear-gradient(135deg,#a23bff,#5a2fd6); color: #fff; font-weight: 700; cursor: pointer;
  }

  .shell { min-height: 100vh; display: grid; grid-template-columns: 240px 1fr; }
  aside {
    background: #100a2e; padding: 20px 12px; display: flex; flex-direction: column; gap: 6px;
    border-right: 1px solid rgba(255,255,255,0.06);
  }
  aside .brand {
    font-weight: 800; font-size: 18px; padding: 8px 12px 18px; color: #d2a6ff; letter-spacing: 0.5px;
  }
  aside nav { display: flex; flex-direction: column; gap: 4px; }
  aside nav button {
    text-align: left; background: transparent; border: none;
    color: #cdbcf2; padding: 10px 12px; border-radius: 8px; font-size: 14px; cursor: pointer;
  }
  aside nav button:hover { background: rgba(255,255,255,0.05); color: #fff; }
  aside nav button.active {
    background: linear-gradient(135deg,rgba(162,59,255,0.25),rgba(90,47,214,0.25)); color: #fff;
  }
  aside .logout {
    margin-top: auto; padding: 10px;
    background: transparent; color: #ff7a7a;
    border: 1px solid rgba(255,122,122,0.3); border-radius: 8px; cursor: pointer;
  }
  main { padding: 28px 32px; overflow: auto; }
  main h2 { margin: 0 0 16px; font-size: 22px; }

  input, select {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    color: #fff; border-radius: 8px; padding: 8px 12px; font-size: 14px;
  }

  .stat-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px;
  }
  .stat-card {
    background: #14102d; border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px; padding: 16px;
  }
  .stat-card .v { font-size: 26px; font-weight: 800; margin: 6px 0; }
  .stat-card .s { color: #a89bc7; font-size: 12px; }

  table.data {
    width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 13px;
  }
  table.data th, table.data td {
    padding: 10px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  table.data th {
    color: #a89bc7; font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  table.data .actions { display: flex; gap: 6px; }
  table.data button {
    background: rgba(255,255,255,0.08); color: #fff;
    border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
    padding: 5px 10px; font-size: 12px; cursor: pointer;
  }
  table.data button.danger {
    background: rgba(255,122,122,0.15); color: #ff7a7a; border-color: rgba(255,122,122,0.3);
  }

  .pill {
    padding: 2px 8px; border-radius: 6px; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.5px; background: rgba(255,255,255,0.08);
  }
  .pill.ok        { background: rgba(110,232,149,0.15); color: #6ee895; }
  .pill.ban       { background: rgba(255,122,122,0.15); color: #ff7a7a; }
  .pill.completed { background: rgba(110,232,149,0.15); color: #6ee895; }
  .pill.pending   { background: rgba(255,200,80,0.15);  color: #ffd086; }
  .pill.failed    { background: rgba(255,122,122,0.15); color: #ff7a7a; }

  .settings-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px; margin: 20px 0;
  }
  .setting-row {
    background: #14102d; border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px; padding: 14px;
  }
  .setting-row label { display: block; font-size: 13px; color: #cdbcf2; margin-bottom: 6px; }
  .setting-row input { width: 100%; }
  .setting-row .h { color: #8a7eb0; font-size: 12px; margin-top: 6px; }

  button.primary {
    padding: 10px 18px; border-radius: 8px; border: none;
    background: linear-gradient(135deg,#a23bff,#5a2fd6); color: #fff;
    font-weight: 700; cursor: pointer;
  }
  .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
</style>
</head>
<body>
<div id="root"></div>
<script src="/admin.js"></script>
</body>
</html>
